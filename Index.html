<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scopri chi </title>
  <style>
    body { font-family: system-ui, Arial; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    input { padding: 10px; width: 100%; max-width: 360px; }
    button { padding: 10px 14px; margin-top: 10px; cursor: pointer; }
    .msg { margin-top: 14px; }
    img { margin-top: 18px; max-width: 100%; height: auto; border: 1px solid #eee; border-radius: 8px; }
    .hint { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Esential.2025</h2>
  <p class="hint">Si el código es correcto, se mostrará la imagen.</p>

  <input id="code" placeholder="Ej: Esential.2025" />
  \

  <button id="btn">Ver imagen</button>

  <div id="msg" class="msg"></div>
  <div id="imgwrap"></div>

<script>
  // 1) MAPA: código -> archivo de imagen
  // Cambia los códigos y nombres de archivo por los tuyos
  const codes = {
    "esential.2026": "img/3a84df7cc8bfa449a20752e7f757f0b4.jpg",
    "esential.2025": "img/IMG_8824.jpeg"
  };

  function show() {
    const c = document.getElementById("code").value.trim();
    const msg = document.getElementById("msg");
    const imgwrap = document.getElementById("imgwrap");

    msg.textContent = "";
    imgwrap.innerHTML = "";

    const imgPath = codes[c];

    if (!imgPath) {
      msg.textContent = "Código inválido. Revisa y prueba otra vez.";
      return;
    }

    msg.textContent = "Código correcto.";
    const img = document.createElement("img");
    img.src = imgPath;
    img.alt = "Imagen";
    imgwrap.appendChild(img);
  }

  document.getElementById("btn").addEventListener("click", show);
  document.getElementById("code").addEventListener("keydown", (e) => {
    if (e.key === "Enter") show();
  });
</script>
</body>
</html>
